name: Gathern Pricing

on:
  schedule:
    # كل ساعة من 8 صباحاً حتى 8 مساءً UTC = 11 صباحاً حتى 11 مساءً بتوقيت السعودية
    - cron: '0 * * * *'
  workflow_dispatch:  # تشغيل يدوي من GitHub عند الحاجة

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    env:
      GATHERN_PHONE:      ${{ secrets.GATHERN_PHONE }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      DISPLAY: ':99'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Restore browser session
        uses: actions/cache@v4
        with:
          path: session_state.json
          key: gathern-session-v1

      - name: Start virtual display
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2

      - name: Run pricing tool
        run: python pricing.py

      - name: Save browser session
        uses: actions/cache/save@v4
        if: always()
        with:
          path: session_state.json
          key: gathern-session-v1

      - name: Save history data
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git merge --no-edit FETCH_HEAD
          git add data/history.csv
          git diff --cached --quiet || git commit -m "data: update history $(date -u '+%Y-%m-%d %H:%M')"
          git push || echo "تحذير: فشل رفع البيانات"
